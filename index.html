<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diario - Home</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="index.js"></script>
</head>
<body class="light">
  <!-- SVG sprite (icone minimal) -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="i-plus" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-upload" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M12 4v12" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M7 9l5-5 5 5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="i-download" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M12 20V8" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M7 13l5 5 5-5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="i-moon" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="1.8" fill="none"/>
    </symbol>
    <symbol id="i-sun" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l-1.5-1.5M20.5 20.5L19 19M5 19l-1.5 1.5M20.5 3.5L19 5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </symbol>
  </svg>

  <header class="site-header">
    <h1>Diario</h1>
    <div class="header-actions">
      <button id="importBtn" class="icon-btn" title="Importa archivio (.json)" aria-label="Importa">
        <svg><use href="#i-upload"></use></svg>
      </button>
      <button id="exportBtn" class="icon-btn" title="Esporta tutte le note (.json)" aria-label="Esporta">
        <svg><use href="#i-download"></use></svg>
      </button>
      <button id="newNote" class="icon-btn" title="Nuova nota" aria-label="Nuova nota">
        <svg><use href="#i-plus"></use></svg>
      </button>
      <input type="file" id="importFile" accept=".json,application/json" hidden multiple>
    </div>
  </header>

  <main id="noteList" class="home-list"></main>

  <button class="theme-toggle" id="themeToggle" aria-label="Cambia tema">
    <svg id="themeIcon"><use href="#i-moon"></use></svg>
  </button>
</body>
</html>

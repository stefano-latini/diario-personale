<style>
  :root{
    --bg: #f8f5e7;
    --fg: #333333;
    --subtle: rgba(0,0,0,.55);
    --faint: rgba(0,0,0,.35);
    --card: rgba(0,0,0,.05);
    --card-hover: rgba(0,0,0,.09);
    --icon: #7a7a7a;
    --accent: #8b3a3a;
    --danger: #c60000;
    --hr: rgba(0,0,0,.08);
  }
  body.dark{
    --bg: #2a2a2a;
    --fg: #eaeaea;
    --subtle: rgba(255,255,255,.65);
    --faint: rgba(255,255,255,.35);
    --card: rgba(255,255,255,.06);
    --card-hover: rgba(255,255,255,.12);
    --icon: #b8b8b8;
    --accent: #c66b6b;
    --danger: #ff6b6b;
    --hr: rgba(255,255,255,.10);
  }

  *{ box-sizing:border-box }
  html, body{ height:100%; margin:0 }
  body{
    background: var(--bg);
    color: var(--fg);
    font-family: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Times New Roman', Times, serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    transition: background-color .25s ease, color .25s ease;
    overscroll-behavior-y: none;
  }

  .view{
    min-height: 100vh;
    min-height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .view.hidden{ display: none }

  /* ---------- HOME ---------- */
  .site-header{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    padding: 16px 20px 8px;
    max-width: 820px;
    margin: 0 auto;
  }
  .site-header h1{
    margin:0;
    font-size: 1.9rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .header-actions{ display:flex; gap:4px; align-items:center }

  .search-wrap{
    max-width: 820px; margin: 0 auto;
    padding: 4px 20px 8px;
  }
  .search{
    width:100%;
    background: var(--card);
    border: none; outline: none;
    color: var(--fg);
    font: inherit;
    font-size: .98rem;
    padding: 10px 14px;
    border-radius: 10px;
    transition: background-color .15s;
  }
  .search:focus{ background: var(--card-hover) }
  .search::placeholder{ color: var(--faint); font-style: italic }

  .home-list{
    max-width: 820px;
    margin: 0 auto;
    padding: 8px 20px 96px;
    display: flex; flex-direction: column;
    gap: 8px;
  }
  .noteItem{
    padding: 14px 16px;
    border-radius: 10px;
    background: var(--card);
    cursor: pointer;
    transition: background-color .15s;
  }
  .noteItem:hover{ background: var(--card-hover) }
  .noteItem:active{ transform: translateY(1px) }
  .noteItem .row{ display:flex; align-items:baseline; justify-content:space-between; gap:12px }
  .noteItem .title{
    font-weight: 600;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    flex: 1;
  }
  .noteItem .date{
    font-size: .85rem;
    color: var(--subtle);
    white-space: nowrap;
    font-style: italic;
  }
  .noteItem .preview{
    font-size: .92rem;
    color: var(--subtle);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .empty-state{
    max-width: 520px; margin: 80px auto 0;
    padding: 0 20px;
    text-align: center;
    color: var(--subtle);
  }
  .empty-state .ico{ opacity: .35; margin-bottom: 16px }
  .empty-state .ico svg{ width: 56px; height: 56px }
  .empty-state h2{
    margin: 0 0 8px;
    font-weight: 500;
    font-size: 1.25rem;
    color: var(--fg);
    font-style: italic;
  }
  .empty-state p{ margin: 0; font-size: .95rem }

  /* ---------- NOTE ---------- */
  .note-header{
    display:flex; align-items:center; gap: 8px;
    padding: 12px 20px;
    max-width: 820px;
    margin: 0 auto;
    border-bottom: 1px solid var(--hr);
  }
  .title-input{
    flex: 1;
    border: none; outline: none;
    background: transparent;
    color: var(--fg);
    font: inherit;
    font-size: 1.5rem;
    font-style: italic;
    padding: 4px 0;
    min-width: 0;
  }
  .title-input::placeholder{ color: var(--faint) }
  .toolbar{ display:flex; gap: 4px }

  .note-main{
    max-width: 820px;
    margin: 0 auto;
    padding: 14px 20px 40px;
    display: flex; flex-direction: column;
    /* fill rest of viewport */
    min-height: calc(100dvh - 70px);
  }
  .editor{
    flex: 1;
    width: 100%;
    min-height: 50vh;
    border: none; outline: none; resize: none;
    background: transparent;
    color: var(--fg);
    font: inherit;
    font-size: 1.05rem;
    line-height: 1.7;
    padding: 0;
  }
  .editor::placeholder{ color: var(--faint); font-style: italic }
  .note-meta{
    margin-top: 16px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: .82rem;
    color: var(--faint);
    font-style: italic;
    padding-top: 10px;
    border-top: 1px solid var(--hr);
  }

  /* ---------- BUTTONS ---------- */
  .icon-btn{
    border: none; background: transparent;
    padding: 8px;
    cursor: pointer;
    color: var(--icon);
    border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background-color .15s, color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .icon-btn:hover{ background: var(--card); color: var(--fg) }
  .icon-btn:active{ background: var(--card-hover) }
  .icon-btn svg{ width: 22px; height: 22px; display: block }

  .theme-toggle{
    position: fixed;
    right: max(16px, env(safe-area-inset-right));
    bottom: max(16px, env(safe-area-inset-bottom));
    border: none;
    background: var(--card);
    cursor: pointer;
    padding: 10px;
    color: var(--icon);
    border-radius: 50%;
    transition: background-color .15s, color .15s;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .theme-toggle:hover{ background: var(--card-hover); color: var(--fg) }
  .theme-toggle svg{ width: 22px; height: 22px; display: block }

  /* ---------- OVERLAY ---------- */
  .overlay{
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.45);
    padding: 20px;
    z-index: 100;
    animation: fadeIn .15s ease-out;
  }
  .overlay.hidden{ display: none }
  @keyframes fadeIn{ from{ opacity: 0 } to{ opacity: 1 } }
  .confirm{
    background: var(--bg); color: var(--fg);
    border-radius: 14px;
    padding: 22px;
    width: 100%; max-width: 340px;
    box-shadow: 0 20px 50px rgba(0,0,0,.35);
    border: 1px solid var(--hr);
  }
  .confirm-text{ margin-bottom: 18px; line-height: 1.5 }
  .confirm-actions{ display: flex; gap: 8px; justify-content: flex-end }
  .btn{
    border: 1px solid var(--card-hover);
    background: transparent;
    color: var(--fg);
    font: inherit;
    font-size: .95rem;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover{ background: var(--card) }
  .btn.danger{
    border-color: var(--danger);
    color: var(--danger);
  }
  .btn.danger:hover{ background: rgba(198,0,0,.08) }

  /* ---------- TOAST ---------- */
  .toast{
    position: fixed;
    left: 50%; transform: translateX(-50%) translateY(20px);
    bottom: max(80px, calc(env(safe-area-inset-bottom) + 80px));
    background: var(--fg); color: var(--bg);
    padding: 10px 18px;
    border-radius: 24px;
    font-size: .9rem;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 200;
    max-width: 90vw;
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* tablet/desktop typography bump */
  @media (min-width: 720px){
    .editor{ font-size: 1.1rem }
    .site-header h1{ font-size: 2.1rem }
  }
</style>
</head>

<script>
'use strict';

/* ============================================================
   STORAGE  +  MIGRATION
   ============================================================ */
const STORAGE_KEY = 'notes';

function uid(){
  if (crypto && typeof crypto.randomUUID === 'function') return crypto.randomUUID();
  return 'n_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
}

function getNotes(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function setNotes(notes){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
}

/* Parse "5 maggio 2026" → ISO. Returns null if unrecognized. */
function parseItalianDate(s){
  if (!s || typeof s !== 'string') return null;
  const months = {
    gennaio:0, febbraio:1, marzo:2, aprile:3, maggio:4, giugno:5,
    luglio:6, agosto:7, settembre:8, ottobre:9, novembre:10, dicembre:11
  };
  const m = /^(\d{1,2})\s+([a-zà]+)\s+(\d{4})$/i.exec(s.trim());
  if (m){
    const month = months[m[2].toLowerCase()];
    if (month !== undefined){
      return new Date(+m[3], month, +m[1], 12).toISOString();
    }
  }
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d.toISOString();
}

/* Migrate legacy notes (no id, locale-string `date`) → new schema */
function migrate(){
  const notes = getNotes();
  if (notes.length === 0){
    localStorage.removeItem('currentNote');
    return;
  }
  let changed = false;
  const migrated = notes.map(n => {
    const out = { ...n };
    if (!out.id){ out.id = uid(); changed = true; }
    if (!out.createdAt){
      out.createdAt = parseItalianDate(out.date) || new Date().toISOString();
      changed = true;
    }
    if (!out.updatedAt){
      out.updatedAt = out.createdAt;
      changed = true;
    }
    if (typeof out.title !== 'string'){ out.title = ''; changed = true; }
    if (typeof out.content !== 'string'){ out.content = ''; changed = true; }
    if ('date' in out){ delete out.date; changed = true; }
    return out;
  });
  if (changed) setNotes(migrated);
  localStorage.removeItem('currentNote');
}
migrate();

/* ============================================================
   FORMATTING
   ============================================================ */
function formatDate(iso){
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric' });
}
function formatDateTime(iso){
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric' })
       + ' · '
       + d.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
}
function countWords(s){
  if (!s) return 0;
  const m = s.trim().match(/\S+/g);
  return m ? m.length : 0;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

/* ============================================================
   DOM REFS
   ============================================================ */
const $ = id => document.getElementById(id);

const homeView   = $('view-home');
const noteView   = $('view-note');
const listEl     = $('noteList');
const searchWrap = $('searchWrap');
const searchEl   = $('searchInput');
const newBtn     = $('newBtn');
const importBtn  = $('importBtn');
const importFile = $('importFile');
const exportBtn  = $('exportBtn');
const titleEl    = $('noteTitle');
const editorEl   = $('editor');
const backBtn    = $('backBtn');
const deleteBtn  = $('deleteBtn');
const noteDateEl = $('noteDate');
const noteCountEl= $('noteCount');
const overlay    = $('confirmOverlay');
const yesBtn     = $('confirmYes');
const noBtn      = $('confirmNo');
const themeBtn   = $('themeToggle');
const themeIcon  = $('themeIcon');
const toastEl    = $('toast');

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer = null;
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

/* ============================================================
   THEME
   ============================================================ */
function setTheme(theme){
  if (theme === 'dark'){
    document.body.classList.add('dark');
    themeIcon.firstElementChild.setAttribute('href', '#i-sun');
  } else {
    document.body.classList.remove('dark');
    themeIcon.firstElementChild.setAttribute('href', '#i-moon');
  }
  localStorage.setItem('theme', theme);
}
setTheme(localStorage.getItem('theme') || 'light');
themeBtn.addEventListener('click', () => {
  setTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
});

/* ============================================================
   ROUTING (hash-based)
     #/        → home
     #/note/ID → editor
     #/new     → new note (creates id, then redirects)
   ============================================================ */
function navigate(){
  const h = location.hash || '';
  if (h === '#/new'){
    const id = createBlankNote();
    location.replace('#/note/' + id);
    return;
  }
  const m = /^#\/note\/(.+)$/.exec(h);
  if (m){
    showNote(m[1]);
  } else {
    showHome();
  }
}
window.addEventListener('hashchange', navigate);

function showHome(){
  // flush any pending save before leaving editor
  flushSave();
  currentId = null;
  noteView.classList.add('hidden');
  homeView.classList.remove('hidden');
  renderList();
  // scroll to top so the most recent note is visible
  window.scrollTo(0, 0);
}

function showNote(id){
  const notes = getNotes();
  const note = notes.find(n => n.id === id);
  if (!note){
    // unknown id → bounce home
    location.replace('#/');
    return;
  }
  currentId = id;
  titleEl.value = note.title || '';
  editorEl.value = note.content || '';
  updateNoteMeta(note);
  homeView.classList.add('hidden');
  noteView.classList.remove('hidden');
  // focus editor on new/empty notes, otherwise leave the user free
  if (!note.title && !note.content){
    setTimeout(() => titleEl.focus(), 30);
  }
}

/* ============================================================
   LIST RENDER + SEARCH
   ============================================================ */
let searchQuery = '';
function renderList(){
  const all = getNotes()
    .slice()
    .sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));

  // toggle search bar visibility (only useful when there are several notes)
  searchWrap.hidden = all.length < 4;

  const q = searchQuery.trim().toLowerCase();
  const notes = q
    ? all.filter(n =>
        (n.title || '').toLowerCase().includes(q) ||
        (n.content || '').toLowerCase().includes(q))
    : all;

  if (all.length === 0){
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><use href="#i-book"/></svg></div>
        <h2>Il tuo diario è vuoto</h2>
        <p>Tocca <strong>+</strong> in alto per scrivere la prima nota.</p>
      </div>`;
    return;
  }

  if (notes.length === 0){
    listEl.innerHTML = `
      <div class="empty-state">
        <h2>Nessun risultato</h2>
        <p>Nessuna nota corrisponde a “${escapeHtml(q)}”.</p>
      </div>`;
    return;
  }

  listEl.innerHTML = '';
  notes.forEach(n => {
    const item = document.createElement('div');
    item.className = 'noteItem';
    item.setAttribute('role', 'button');
    item.setAttribute('tabindex', '0');

    const titleText = n.title || (n.content || '').split('\n')[0] || 'Senza titolo';
    const previewText = (n.content || '').replace(/\s+/g, ' ').trim();

    item.innerHTML = `
      <div class="row">
        <div class="title">${escapeHtml(titleText)}</div>
        <div class="date">${escapeHtml(formatDate(n.updatedAt || n.createdAt))}</div>
      </div>
      ${previewText ? `<div class="preview">${escapeHtml(previewText)}</div>` : ''}
    `;
    item.addEventListener('click', () => { location.hash = '#/note/' + n.id; });
    item.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        location.hash = '#/note/' + n.id;
      }
    });
    listEl.appendChild(item);
  });
}

searchEl.addEventListener('input', e => {
  searchQuery = e.target.value;
  renderList();
});

/* ============================================================
   EDITOR  (debounced autosave)
   ============================================================ */
let currentId = null;
let saveTimer = null;
const SAVE_DELAY = 250;

function createBlankNote(){
  const now = new Date().toISOString();
  const id = uid();
  const notes = getNotes();
  notes.push({
    id,
    title: '',
    content: '',
    createdAt: now,
    updatedAt: now
  });
  setNotes(notes);
  return id;
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrent, SAVE_DELAY);
}
function flushSave(){
  if (saveTimer){
    clearTimeout(saveTimer);
    saveTimer = null;
    saveCurrent();
  }
}
function saveCurrent(){
  if (!currentId) return;
  const notes = getNotes();
  const i = notes.findIndex(n => n.id === currentId);
  if (i === -1) return;
  const newTitle   = titleEl.value;
  const newContent = editorEl.value;
  // skip write if nothing changed
  if (notes[i].title === newTitle && notes[i].content === newContent) return;
  notes[i].title = newTitle;
  notes[i].content = newContent;
  notes[i].updatedAt = new Date().toISOString();
  setNotes(notes);
  updateNoteMeta(notes[i]);
}

function updateNoteMeta(note){
  if (!note) return;
  noteDateEl.textContent = formatDateTime(note.updatedAt || note.createdAt);
  const w = countWords(editorEl.value);
  const c = editorEl.value.length;
  noteCountEl.textContent = c === 0
    ? ''
    : `${w} ${w === 1 ? 'parola' : 'parole'} · ${c} caratteri`;
}

editorEl.addEventListener('input', () => {
  scheduleSave();
  // live word count without waiting for debounced save
  if (currentId){
    const w = countWords(editorEl.value);
    const c = editorEl.value.length;
    noteCountEl.textContent = c === 0 ? '' : `${w} ${w === 1 ? 'parola' : 'parole'} · ${c} caratteri`;
  }
});
titleEl.addEventListener('input', scheduleSave);

// flush on tab hide / unload to avoid losing the last 250ms
window.addEventListener('beforeunload', flushSave);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') flushSave();
});

/* ============================================================
   NEW NOTE  /  BACK  /  DELETE
   ============================================================ */
newBtn.addEventListener('click', () => { location.hash = '#/new'; });

backBtn.addEventListener('click', () => {
  flushSave();
  // if the note is still completely empty, drop it
  if (currentId){
    const notes = getNotes();
    const i = notes.findIndex(n => n.id === currentId);
    if (i !== -1 && !notes[i].title.trim() && !notes[i].content.trim()){
      notes.splice(i, 1);
      setNotes(notes);
    }
  }
  // prefer history.back so the OS gesture / browser back works
  if (history.length > 1 && location.hash.startsWith('#/note/')){
    history.back();
  } else {
    location.hash = '#/';
  }
});

deleteBtn.addEventListener('click', () => {
  $('confirmText').textContent = 'Eliminare definitivamente questa nota?';
  pendingAction = 'delete-note';
  overlay.classList.remove('hidden');
});

/* ============================================================
   CONFIRM OVERLAY (multi-purpose)
   ============================================================ */
let pendingAction = null;
let pendingPayload = null;

noBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  pendingAction = null;
  pendingPayload = null;
});
yesBtn.addEventListener('click', () => {
  const action = pendingAction;
  const payload = pendingPayload;
  overlay.classList.add('hidden');
  pendingAction = null;
  pendingPayload = null;

  if (action === 'delete-note'){
    if (!currentId) return;
    const notes = getNotes().filter(n => n.id !== currentId);
    setNotes(notes);
    currentId = null;
    location.hash = '#/';
    toast('Nota eliminata');
  } else if (action === 'import-replace'){
    setNotes(payload);
    toast(`Importate ${payload.length} note`);
    if (location.hash.startsWith('#/note/')) location.hash = '#/';
    else renderList();
  }
});

// dismiss overlay on backdrop click
overlay.addEventListener('click', e => {
  if (e.target === overlay) noBtn.click();
});
// ESC closes overlay
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !overlay.classList.contains('hidden')) noBtn.click();
});

/* ============================================================
   IMPORT  /  EXPORT
   ============================================================ */
importBtn.addEventListener('click', () => importFile.click());

importFile.addEventListener('change', async e => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  if (!/\.json$/i.test(file.name)){
    toast('Seleziona un file .json');
    e.target.value = '';
    return;
  }
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!Array.isArray(data)) throw new Error('formato non valido');

    const now = new Date().toISOString();
    const cleaned = data.map(n => {
      const id = (typeof n.id === 'string' && n.id) ? n.id : uid();
      const createdAt = (typeof n.createdAt === 'string' && n.createdAt)
        ? n.createdAt
        : (parseItalianDate(n.date) || now);
      const updatedAt = (typeof n.updatedAt === 'string' && n.updatedAt)
        ? n.updatedAt
        : createdAt;
      return {
        id,
        title:   typeof n.title   === 'string' ? n.title   : '',
        content: typeof n.content === 'string' ? n.content : '',
        createdAt,
        updatedAt
      };
    });

    const existing = getNotes().length;
    const msg = existing > 0
      ? `Importare ${cleaned.length} note? Sostituirà le ${existing} note attuali.`
      : `Importare ${cleaned.length} note?`;
    $('confirmText').textContent = msg;
    pendingAction = 'import-replace';
    pendingPayload = cleaned;
    overlay.classList.remove('hidden');
  } catch (err){
    console.error(err);
    toast('File .json non valido');
  } finally {
    e.target.value = '';
  }
});

exportBtn.addEventListener('click', () => {
  flushSave();
  const notes = getNotes();
  if (notes.length === 0){ toast('Nessuna nota da esportare'); return; }
  const blob = new Blob([JSON.stringify(notes, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const stamp = new Date().toISOString().slice(0,10);
  a.download = `diario-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  toast(`Esportate ${notes.length} note`);
});

/* ============================================================
   KEYBOARD SHORTCUTS
   ============================================================ */
document.addEventListener('keydown', e => {
  // Cmd/Ctrl+N → new note (only when on home, not while typing)
  if ((e.metaKey || e.ctrlKey) && e.key === 'n' && location.hash !== '#/note/'){
    const tag = document.activeElement?.tagName;
    if (tag !== 'TEXTAREA' && tag !== 'INPUT'){
      e.preventDefault();
      location.hash = '#/new';
    }
  }
});

/* ============================================================
   BOOT
   ============================================================ */
navigate();
</script>
